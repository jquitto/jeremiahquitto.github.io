apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sre-demo
resources:
  - ../../base/namespace.yaml
  - ../../base/deployment.yaml
  - ../../base/service.yaml
  - ../../base/hpa.yaml
  - ../../base/pdb.yaml
  - ../../base/configmap.yaml
  - ../../base/secret.yaml
patches:
  - target:
      kind: Deployment
      name: sample-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: dev
